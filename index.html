<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>ФИГУРАНЕР</title>

    <!-- Google tag -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JPBPKS9NPX"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-JPBPKS9NPX');
    </script>

    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }

        body {
            margin:0;
            padding:0;
            background:#0a0a1f;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100dvh;
            overflow:hidden;
            touch-action:none;
        }

        /* ✅ НОВОЕ: рамка */
        .game-frame {
            position:relative;
            border:6px solid #ffffff;
            border-radius:12px;
            box-shadow:0 0 40px rgba(255,255,255,0.3);
            overflow:hidden;
        }

        /* ✅ ЧИСТЫЙ canvas */
        canvas#game {
            display:block;
            image-rendering:pixelated;
        }

        /* ── OVERLAY ── */
        #overlay {
            position:absolute;
            top:0;left:0;
            width:100%;height:100%;
            pointer-events:none;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            color:white;
            text-align:center;
            text-shadow:0 4px 12px rgba(0,0,0,0.9);
            padding:16px;
        }

        h1 { font-size:clamp(28px,8vw,52px);margin:0 0 8px 0;letter-spacing:3px;line-height:1.1; }
        .subtitle { font-size:clamp(13px,3.5vw,22px);margin:4px 0;opacity:0.9; }
        .score-line { font-size:clamp(16px,4.5vw,26px);margin:5px 0;font-weight:bold; }

        .overlay-btn {
            pointer-events:auto;
            margin-top:clamp(14px,3vw,30px);
            padding:clamp(10px,2.5vw,16px) clamp(22px,6vw,40px);
            font-size:clamp(18px,5vw,26px);
            background:#ff3366;
            color:white;
            border:none;
            border-radius:50px;
            cursor:pointer;
            box-shadow:0 6px 0 #c00;
            transition:all 0.1s;
        }

        .overlay-btn:active {
            transform:translateY(4px);
            box-shadow:0 2px 0 #c00;
        }

        .gameover-box {
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:2px;
            max-width:90vw;
        }

        /* HUD */
        #score {
            position:absolute;
            top:16px;
            left:16px;
            font-size:clamp(20px,4vw,36px);
            font-weight:bold;
            color:#fff;
            text-shadow:0 3px 8px rgba(0,0,0,0.7);
            z-index:10;
        }

        #coins-hud {
            position:absolute;
            top:16px;
            right:60px;
            font-size:clamp(18px,3.5vw,32px);
            font-weight:bold;
            color:#f1c40f;
            text-shadow:0 3px 8px rgba(0,0,0,0.7);
            z-index:10;
            text-align:right;
            line-height:1.25;
        }

        .medal-popup {
            position:absolute;
            top:50%;left:50%;
            transform:translate(-50%,-50%);
            font-size:clamp(22px,5vw,38px);
            font-weight:bold;
            color:#f1c40f;
            text-shadow:0 4px 16px rgba(0,0,0,0.9);
            pointer-events:none;
            opacity:0;
            transition:opacity 0.3s;
            z-index:20;
            white-space:nowrap;
        }

        /* Пауза */
        #pause-btn {
            position:absolute;
            top:12px; right:12px;
            width:44px; height:44px;
            font-size:22px;
            background:rgba(0,0,0,0.45);
            color:#fff;
            border:2px solid rgba(255,255,255,0.5);
            border-radius:50%;
            cursor:pointer;
            z-index:30;
            display:none;
            align-items:center;
            justify-content:center;
        }

        #pause-menu {
            position:absolute;
            top:0;left:0;
            width:100%;height:100%;
            display:none;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            background:rgba(0,0,0,0.65);
            z-index:25;
            gap:24px;
            backdrop-filter:blur(3px);
        }

        .pause-action-btn {
            display:flex;
            align-items:center;
            gap:clamp(12px,3vw,18px);
            padding: clamp(13px,3vw,18px) clamp(28px,7vw,44px);
            font-size:clamp(17px,4.5vw,24px);
            color:white;
            background:transparent;
            border:1.5px solid rgba(255,255,255,0.35);
            border-radius:14px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="game-frame">
    <canvas id="game" width="540" height="960"></canvas>

    <!-- Старт / конец -->
    <div id="overlay">
        <div id="start">
            <h1>ФИГУРАНЕР</h1>
            <p class="subtitle">Тап / клик / ПРОБЕЛ — прыжок</p>
            <p class="subtitle">Двойной прыжок в воздухе</p>
            <button class="overlay-btn" onclick="startGame()">НАЧАТЬ ИГРУ</button>
        </div>
        <div id="gameover" style="display:none">
            <div class="gameover-box">
                <h1>Не победил</h1>
                <p class="score-line" id="final">Счёт: 0 м</p>
                <p class="score-line" id="best">Рекорд: 0 м</p>
                <p class="score-line" id="coinscore">Монет: 0</p>
                <button class="overlay-btn" onclick="restartGame()">ЕЩЁ РАЗ</button>
            </div>
        </div>
    </div>

    <!-- Кнопка паузы -->
    <button id="pause-btn" onclick="togglePause()">⏸</button>

    <!-- Меню паузы -->
    <div id="pause-menu">
        <button class="pause-action-btn" onclick="togglePause()">
            <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
                <polygon points="7,3 23,13 7,23" fill="white"/>
            </svg>
            Продолжить
        </button>
        <button class="pause-action-btn" onclick="restartFromPause()">
            <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
                <path d="M13 4 A9 9 0 1 1 5.5 8" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
                <polygon points="3,5 8,10 8,0" fill="white"/>
            </svg>
            Сначала
        </button>
    </div>

    <div id="score">0 м</div>
    <div id="coins-hud">
        <div id="coins-session" style="display:flex;align-items:center;gap:5px;">
            <canvas id="coin-icon" width="26" height="26" style="display:block;flex-shrink:0;"></canvas>
            <span id="coins-val">0</span>
        </div>
        <div id="coins-total" style="font-size:0.62em;opacity:0.75;display:flex;align-items:center;gap:4px;justify-content:flex-end;">
            <span>💰</span><span id="coins-all">0</span>
        </div>
    </div>
    <div class="medal-popup" id="medal-popup"></div>
</div>

<!--
    ПОРЯДОК ЗАГРУЗКИ ВАЖЕН:
    1. config.js  — константы и данные (нет зависимостей)
    2. state.js   — переменные состояния (нужен buildMedals из config)
    3. ui.js      — HUD и оверлеи (нужен state)
    4. player.js  — частицы, смерть, прыжок (нужен state + ui.showGameOver)
    5. boosters.js — логика бустеров (нужен player.spawnParticles + ui.showMedal)
    6. platforms.js — платформы и сброс (нужен всё выше)
    7. render.js  — отрисовка (нужен весь state)
    8. main.js    — update, loop, input (нужен всё выше)
-->
<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/ui.js"></script>
<script src="js/player.js"></script>
<script src="js/boosters.js"></script>
<script src="js/platforms.js"></script>
<script src="js/render.js"></script>
<script src="js/main.js"></script>

</body>
</html>
